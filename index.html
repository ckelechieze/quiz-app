<!DOCTYPE html>
<html lang="en">
<head>

  <!--Tailwind Link-->
  <link rel="stylesheet" href="./src/output.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
</head>
<body>

  <div id="app" class="px-4 mt-12">

    <!-- Quiz container -->
    <div id="quiz-box">
      <!--Heading/Instructions-->
      <h1 class="text-3xl text-blue-900 font-bold text-center mb-4 mt-2 tracking-widest">QUIZ APP</h1>

      <p class="text-center text-gray-500 mb-4 text-lg">(Programmed by <a class="text-blue-600 tracking-widest hover:border border-teal-400 p-1 rounded-full" href="https://ckelechieze.github.io/my-personal-portfolio-assignment/">Kelechi Eze</a>)</p>

      <p class="text-gray-400 text-center mb-4">Pick the correct answer from the options provided. Click Next to continue. Your score will be shown at the end of the quiz. Expo is not allowed</p>
      <hr class="border-gray-300 mb-2">
    
      <!--Questions Element-->
      <!--Timer-->
      <p id="timer" class="text-green-500 text-xl font-bold text-center mb-4">
        Time Left: 60s
      </p>
      <h2 id="question" class="text-gray-500 text-2xl font-bolder mb-4">

      </h2>
      
      <!--Options Element-->
      <div id="options" class="flex flex-col items-start gap-3">
        
      </div>

      <button id="next-button" class="bg-blue-900 text-white text-lg font-bold px-6 py-2 rounded-full m-6 disabled:opacity-30 disabled:cursor-not-allowed">Next</button>

    </div>

    <!-- Result screen -->
    <div id="result-box" class="flex flex-col items-center justify-center gap-6 mx-auto min-h-screen" style="display:none;">
      <img class="animate-bounce" src="./images/icon-check.svg" alt="">
      <h2 class="text-3xl text-blue-900 font-bold mb-4 mt-2">Quiz Completed</h2>
      <p id="score-text" class="text-gray-500 font-bold text-xl"></p>
      <button id="restart-button" class="bg-blue-900 text-white text-lg font-bold px-6 py-2 rounded-full m-6">Restart</button>
    </div>

  </div>

  <!--JAVASCRIPT-->
  <script>
  const questions = [
  {
    question: "What is the capital of Nigeria?",
    options: ["Lagos", "Abuja", "Kano", "Ibadan"],
    answer: "Abuja"
  },
  {
  question: "What color do you get when you mix red and blue?",
  options: ["Green", "Purple", "Orange", "Yellow"],
  answer: "Purple"
  },
  {
    question: "Which Nigerian rice is the best?",
    options: ["Abakaliki Rice", "Soloria Rice", "Adani Rice", "Ugwu-Hausa Rice"],
    answer: "Soloria Rice"
  },
  {
  question: "Select the largest organ in the human body.",
  options: ["Heart", "Liver", "Skin", "Brain"],
  answer: "Skin"
  },
  {
  question: "What color do you get when you mix red and blue?",
  options: ["Green", "Purple", "Orange", "Yellow"],
  answer: "Purple"
  },
  {
  question: "Identify the author of 'Romeo and Juliet'.",
  options: ["Charles Dickens", "William Shakespeare", "Mark Twain", "Jane Austen"],
  answer: "William Shakespeare"
  },
  {
  question: "Select the planet with the most moons currently known.",
  options: ["Jupiter", "Mars", "Saturn", "Neptune"],
  answer: "Saturn"
  },
  {
  question: "Choose the data structure that follows the Last-In, First-Out principle.",
  options: ["Queue", "Stack", "Array", "Tree"],
  answer: "Stack"
  },
  {
  question: "Identify the country with the largest population in the world.",
  options: ["India", "China", "United States", "Indonesia"],
  answer: "India"
  },
  {
  question: "Identify the process by which water vapor changes into liquid water.",
  options: ["Evaporation", "Condensation", "Sublimation", "Melting"],
  answer: "Condensation"
  },
  {
  question: "A father and son are in a car crash. The father dies. At the hospital, the surgeon says, 'I can't operate on him; he's my son.' How is this possible?",
  options: ["The surgeon is his mother", "The father survived", "The surgeon is his uncle", "The story is impossible"],
  answer: "The surgeon is his mother"
  },
  {
  question: "A plane crashes on the border between Nigeria and Ghana. Where should the survivors be buried?",
  options: ["Nigeria", "Ghana", "Both countries", "Nowhere"],
  answer: "Nowhere"
  },
  {
  question: "Choose the correct answer: 30 divided by half plus 10.",
  options: ["25", "40", "70", "15"],
  answer: "70"
  },
  {
  question: "Select the heavier item.",
  options: ["1kg of feathers", "1kg of iron", "They weigh the same", "Cannot be determined"],
  answer: "They weigh the same"
  },
  {
  question: "A basket contains 6 apples. You take away 4. How many apples do you have?",
  options: ["2", "4", "6", "10"],
  answer: "4"
  },
  {
  question: "How many months have 28 days?",
  options: ["1", "2", "6", "12"],
  answer: "12"
  },
  {
  question: "Find the smallest prime number.",
  options: ["0", "1", "2", "3"],
  answer: "2"
  },
  {
  question: "Name the largest continent on Earth.",
  options: ["Africa", "Asia", "Europe", "Australia"],
  answer: "Asia"
  },
  {
  question: "Pick the largest planet in the solar system.",
  options: ["Saturn", "Jupiter", "Earth", "Neptune"],
  answer: "Jupiter"
  },
  {
    question: "Which language runs in the browser?",
    options: ["Python", "C++", "JavaScript", "Java"],
    answer: "JavaScript"
  }
];

// STATE
let currentIndex = 0;
let score = 0;
let selectedAnswer = null;

let timeLeft = 300;
let timer;

// Grabbing Elements
const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("next-button");
const restartBtn= document.getElementById("restart-button");

const letters = ["A", "B", "C", "D"];

nextBtn.disabled = true;

function loadQuestion() {
    const current = questions[currentIndex];

    questionEl.textContent = `${currentIndex + 1}. ${current.question}`;

    optionsEl.innerHTML = "";

    current.options.forEach((option, index) => {
        const label = document.createElement("label");
        label.className = "flex items-center gap-3 cursor-pointer mb-2";

        //radio input
        const input = document.createElement("input");
        input.type = "radio";
        input.name = "quiz-option";
        input.value = option;

        input.addEventListener("change", () => {
          selectedAnswer = option;

          //disable all radio buttons after selection
          const allInputs = document.querySelectorAll('input[name="quiz-option"]');
          allInputs.forEach(radio => {
            radio.disabled = true;
          });

          //highlight answers
          const allLabels = optionsEl.querySelectorAll("label");
          allLabels.forEach(label => {
            const optionText = label.children[2].textContent;

            const icon = document.createElement("span");
            icon.className = "ml-auto font-bold text-lg";

            //correct answer = green
            if (optionText === current.answer) {
              label.classList.add(
                "bg-green-100",
                "border",
                "border-green-500",
                "rounded",
                "px-2",
                "py-1"
              );

              icon.textContent = "✓";
              icon.classList.add("text-green-600");

              label.appendChild(icon);
            }

            //wrong answer = red
            if(
              optionText === selectedAnswer &&
              selectedAnswer !== current.answer
            ) {
              label.classList.add(
                "bg-red-100",
                "border",
                "border-red-500",
                "rounded",
                "px-2",
                "py-1"
            );

            const wrongIcon = document.createElement("span");
            wrongIcon.textContent = "✗";
            wrongIcon.className = "ml-auto text-red-600 font-bold text-lg";

            label.appendChild(wrongIcon);
            }
          });
          nextBtn.disabled = false;
        });

        //letter options
        const letter = document.createElement("span");
        letter.textContent = `(${letters[index]})`;
        letter.className = "font-bold w-6 text-center"

        //option text
        const text = document.createElement("span");
        text.textContent = option;

        label.appendChild(input);
        label.appendChild(letter);
        label.appendChild(text)

        optionsEl.appendChild(label);
    })
}
loadQuestion();
if (timer) clearInterval(timer);
startTimer();

//clicking on next button
nextBtn.addEventListener("click", () => {
    const current = questions[currentIndex];
    if (!selectedAnswer) return;

    if (selectedAnswer === current.answer) {
        score++;
    }

    currentIndex++;
    selectedAnswer = null;
    nextBtn.disabled = true;

    if (currentIndex < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
});

//show result function
const quizBox = document.getElementById("quiz-box");
const resultBox = document.getElementById("result-box");
const scoreText = document.getElementById("score-text");

function showResult() {
    quizBox.style.display = "none";
    resultBox.style.display = "flex";

    scoreText.textContent = `You scored ${score} out of ${questions.length}`;
}

//clicking on restart button
restartBtn.addEventListener("click", () => {
  currentIndex = 0;
  score = 0;
  selectedAnswer = null;
  clearInterval(timer);

  resultBox.style.display = "none";
  quizBox.style.display = "block";

  loadQuestion();
  startTimer();
});

//Timer
function startTimer() {
  timeLeft = 180;

  const timerEl = document.getElementById("timer");
  timerEl.textContent = `Time Left: ${timeLeft}s`;
  timerEl.style.color = "green";

  timer = setInterval(() => {
    timeLeft--;

    timerEl.textContent = `Time Left: ${timeLeft}s`;

    if (timeLeft <= 10) {
      timerEl.style.color = "red";
    }

    if (timeLeft === 0) {
      clearInterval(timer);
      showResult();
    }
  }, 1000);
}
</script>
</body>
</html>
